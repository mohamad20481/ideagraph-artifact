# docker-compose.yml — full IdeaGraph production stack for local / staging.
#
# Services:
#   web      - Streamlit UI (port 8510)
#   api      - FastAPI REST + Prometheus /metrics (port 8502)
#   worker   - Celery worker for pipeline jobs
#   redis    - broker + cache + session store
#   postgres - primary database (replaces SQLite at scale)
#
# Usage:
#   cp .env.example .env      # fill in secrets
#   docker compose up --build
#   open http://localhost:8510

services:
  web:
    build: .
    image: ideagraph:latest
    env_file: .env
    environment:
      TASK_QUEUE_BACKEND: celery
      CELERY_BROKER_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://ideagraph:ideagraph@postgres:5432/ideagraph
      API_ALLOWED_ORIGINS: http://localhost:8510,http://localhost:3000
      LOG_LEVEL: INFO
    ports:
      - "8510:8510"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - app_output:/app/output
    restart: unless-stopped

  api:
    build: .
    image: ideagraph:latest
    env_file: .env
    environment:
      TASK_QUEUE_BACKEND: celery
      CELERY_BROKER_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://ideagraph:ideagraph@postgres:5432/ideagraph
      API_ALLOWED_ORIGINS: http://localhost:8510,http://localhost:3000
      LOG_LEVEL: INFO
    command: >
      bash -lc "uvicorn api:app --host 0.0.0.0 --port 8502 --workers 4"
    ports:
      - "8502:8502"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - app_output:/app/output
    restart: unless-stopped

  worker:
    build: .
    image: ideagraph:latest
    env_file: .env
    environment:
      TASK_QUEUE_BACKEND: celery
      CELERY_BROKER_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://ideagraph:ideagraph@postgres:5432/ideagraph
      LOG_LEVEL: INFO
    command: >
      bash -lc "celery -A task_queue.get_task_queue().app worker
                --loglevel=info --concurrency=10 -Q default"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - app_output:/app/output
    # Scale out with:  docker compose up --scale worker=4
    deploy:
      replicas: 2
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ideagraph
      POSTGRES_PASSWORD: ideagraph
      POSTGRES_DB: ideagraph
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ideagraph"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Optional: Prometheus + Grafana observability stack ──────────────────
  # Uncomment to enable scraping of /metrics.
  #
  # prometheus:
  #   image: prom/prometheus:latest
  #   volumes:
  #     - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   ports: ["9090:9090"]
  #
  # grafana:
  #   image: grafana/grafana:latest
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: admin
  #   ports: ["3001:3000"]
  #   volumes: [grafana_data:/var/lib/grafana]

volumes:
  app_data:
  app_output:
  redis_data:
  pg_data:
  # grafana_data:
